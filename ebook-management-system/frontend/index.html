<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EBookShelf — Digital Library</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Landing page specific styles */
    body { background: linear-gradient(135deg, var(--navy) 0%, #0D2B5E 60%, #0B3D91 100%); }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(0,180,216,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-logo {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--accent), var(--blue-light));
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      margin-bottom: 2rem;
      box-shadow: 0 12px 40px rgba(0,180,216,0.35);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      color: var(--white);
      margin-bottom: 1rem;
      letter-spacing: -1px;
    }

    .hero h1 span { color: var(--accent); }

    .hero p {
      color: var(--gray-400);
      font-size: 1.15rem;
      max-width: 500px;
      margin-bottom: 3rem;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero-btns .btn {
      padding: 0.85rem 2rem;
      font-size: 1rem;
    }

    .btn-accent {
      background: linear-gradient(135deg, var(--accent), #0096C7);
      color: var(--white);
      box-shadow: 0 6px 20px rgba(0,180,216,0.4);
    }

    .btn-accent:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0,180,216,0.5);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      border: 1.5px solid rgba(255,255,255,0.2);
    }

    .btn-ghost:hover { background: rgba(255,255,255,0.15); }

    .features {
      display: flex;
      gap: 1.5rem;
      margin-top: 4rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feature-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 0.5rem 1.1rem;
      color: var(--gray-400);
      font-size: 0.85rem;
    }

    .feature-chip span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-logo">📚</div>
    <h1>Your Digital <span>EBookShelf</span></h1>
    <p>Discover, read, and download thousands of e-books. Free access to programming, fiction, science, and more.</p>

    <div class="hero-btns">
      <a href="login.html"    class="btn btn-accent">Get Started →</a>
      <a href="register.html" class="btn btn-ghost">Create Account</a>
    </div>

    <div class="features">
      <div class="feature-chip"><span>✓</span> 500+ Books</div>
      <div class="feature-chip"><span>✓</span> PDF Downloads</div>
      <div class="feature-chip"><span>✓</span> Free Access</div>
      <div class="feature-chip"><span>✓</span> Search & Filter</div>
    </div>
  </div>
</body>
</html>
